version: '3.8'

services:
  # Backend API (Database is Supabase cloud-hosted)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: startup-radar-api
    environment:
      DATABASE_URL: ${DATABASE_URL}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      FROM_EMAIL: ${FROM_EMAIL}
      TO_EMAILS: ${TO_EMAILS}
      PORT: 8000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./logs:/app/logs
      - ./output:/app/output
    command: python main.py

  # Frontend (Next.js)
  frontend:
    image: node:18-alpine
    container_name: startup-radar-frontend
    working_dir: /app
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend

networks:
  default:
    name: startup-radar-network
